<script>

const API = "https://script.google.com/macros/s/AKfycbzwgwoKQNXSWn7BrwlzZe1XmVlY0JnGgA6CKY7cjVUXols6Oo_7IyBIiuVDmoQh__wO/exec";

let data = [];
let list = [];
let i = 0;

// 🔹 LOAD DATA
async function load() {
  const res = await fetch(API + "?action=validationData");
  data = await res.json();

  const kelasUnik = [...new Set(data.map(d => (d.kelas || "").toString().trim()))];

  const select = document.getElementById("kelasSelect");

  kelasUnik.forEach(k => {
    let opt = document.createElement("option");
    opt.value = k;
    opt.textContent = k;
    select.appendChild(opt);
  });

  select.onchange = mulai;
}

// 🔹 START
function mulai() {
  const kelas = document.getElementById("kelasSelect").value;

  list = data.filter(d => (d.kelas || "").toString().trim() === kelas);
  i = 0;

  document.getElementById("app").style.display = "block";

  tampil();
}

// 🔹 SHOW DATA (FIXED)
function tampil() {
  if (i >= list.length) {
    document.body.innerHTML = "<h2>✅ Selesai</h2>";
    return;
  }

  const siswa = list[i];

  const img = document.getElementById("photo");
  const info = document.getElementById("info");

  info.innerText = "";
  img.style.display = "none";

  const link = (siswa.foto || "").toString().trim();

  if (!link) {
    info.innerText = "Foto tidak ditemukan";
    return;
  }

  // 🔥 PRELOAD IMAGE (IMPORTANT FIX)
  const tester = new Image();

  tester.onload = () => {
    img.src = link;
    img.style.display = "block";
  };

  tester.onerror = () => {
    info.innerText = "Foto tidak ditemukan";
  };

  tester.src = link;
}

// 🔹 BENAR
async function benar() {
  const siswa = list[i];

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "submitValidation",
      type: "valid",
      row: siswa.row
    })
  });

  i++;
  tampil();
}

// 🔹 SALAH
async function salah() {
  const nama = prompt("Siapa nama lengkap siswa ini?");
  if (!nama) return;

  const siswa = list[i];

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "submitValidation",
      type: "false",
      row: siswa.row,
      input: nama
    })
  });

  i++;
  tampil();
}

load();

</script>
